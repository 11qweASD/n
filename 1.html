<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>科目三完整版 (夜间模式·详细版)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #bb86fc;
            --highlight: #ff9900;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            
            line-height: 1.8;
            font-size: 16px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
            font-size: 1.8em;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }
        .step-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-left: 5px solid #555;
        }
        .step-header {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 8px 15px;
            border-radius: 5px;
            display: inline-block;
            color: #470da3; /* 保证标题文字清晰 */
        }
        .info-line {
            margin: 8px 0;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }



   
    </style>
</head>
<body>

<div class="container">
    <h1>🚗 科目三通关秘籍 (夜间版)</h1>
    <!-- 、直线行驶 -->
<div class="step-card" style="border-left-color: #f505;">
 <div class="step-header c-white" style="background-color: #648; color: #3ff; padding: 5px 110px; border-radius: 4px;">通过特殊区域（公交站/学校/人行横道）</div>
  <div class="info-line"><span style="color: #e13a96; margin-right: 30px;">观察要求</span>左右观察，注意观察路边标志（公交站牌、学校警示牌、菱形标线）</div>
  <div class="info-line"><span style="color: #e13a96; margin-right: 30px;">观察要求</span>左右观察，注意观察路边标志（公交站牌、学校警示牌、菱形标线）</div>

</div>
  <div class="step-card" style="border-left-color: #505;">     <!-- 这是边框引线 -->
 <div class="step-header c-white" style="background-color: #648; color: #fff; padding: 5px 110px; border-radius: 4px;">通过特殊区域（公交站/学校/人行横道）</div>
  <div class="info-line"><span style="color: #e13a96; margin-right: 30px;">观察要求</span><span style="color: #ff0000;">左右观察，注意观察路边标志（公交站牌、学校警示牌、菱形标线）</div>
  <div class="info-line"><span style="color: #e13a96; margin-right: 30px;">观察要求</span>左右观察，注意观察路边标志（公交站牌、学校警示牌、菱形标线）</div>

</div>
</body>
</html>
